name: Update Astronomy Data

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests ephem

      - name: Run data fetcher
        run: python scripts/fetch_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "glados@aperture.science"
          git config --local user.name "GLaDOS"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: Update astronomy data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
